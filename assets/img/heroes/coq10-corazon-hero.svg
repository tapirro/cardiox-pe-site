<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg2)" rx="12"/>
  <!-- Heart -->
  <g transform="translate(80,50)">
    <path d="M75,30 C75,10 50,0 35,0 C15,0 0,15 0,35 C0,70 75,130 75,130 C75,130 150,70 150,35 C150,15 135,0 115,0 C100,0 75,10 75,30 Z" fill="url(#heart)" opacity="0.85"/>
    <!-- Energy sparks inside heart -->
    <circle cx="50" cy="50" r="8" fill="#fbbf24" opacity="0.7"/>
    <circle cx="100" cy="45" r="6" fill="#fbbf24" opacity="0.6"/>
    <circle cx="75" cy="70" r="10" fill="#f59e0b" opacity="0.5"/>
    <!-- Mitochondria symbol -->
    <ellipse cx="75" cy="55" rx="30" ry="18" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
    <path d="M50,55 Q60,45 70,55 Q80,65 90,55" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- CoQ10 molecule -->
  <g transform="translate(280,60)">
    <circle cx="30" cy="30" r="20" fill="#f59e0b" opacity="0.8"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Q10</text>
    <circle cx="85" cy="45" r="14" fill="#fbbf24" opacity="0.7"/>
    <circle cx="55" cy="85" r="16" fill="#f97316" opacity="0.6"/>
    <line x1="30" y1="30" x2="85" y2="45" stroke="#fed7aa" stroke-width="3"/>
    <line x1="85" y1="45" x2="55" y2="85" stroke="#fed7aa" stroke-width="3"/>
    <line x1="30" y1="30" x2="55" y2="85" stroke="#fed7aa" stroke-width="3"/>
    <!-- ATP production arrow -->
    <path d="M100,50 L140,50" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="120" y="42" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold" font-family="Arial">ATP</text>
  </g>
  <!-- Stats -->
  <g transform="translate(440,50)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="white" opacity="0.9" stroke="#fca5a5" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" fill="#dc2626" font-size="24" font-weight="bold" font-family="Arial">-43%</text>
    <text x="80" y="48" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial">mortalidad cardiovascular</text>
  </g>
  <g transform="translate(440,130)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="white" opacity="0.9" stroke="#fca5a5" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" fill="#dc2626" font-size="24" font-weight="bold" font-family="Arial">-11 mmHg</text>
    <text x="80" y="48" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial">presión sistólica</text>
  </g>
  <!-- Title -->
  <text x="440" y="240" font-family="Georgia, serif" font-size="22" fill="#1e3a5f" font-weight="bold">CoQ10 y el Corazón</text>
  <text x="440" y="268" font-family="Arial, sans-serif" font-size="14" fill="#64748b">5 beneficios con evidencia clínica</text>
  <!-- Heartbeat line -->
  <path d="M0,290 L200,290 L230,260 L250,290 L260,240 L275,290 L800,290" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
</svg>
