<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg1)" rx="12"/>
  <!-- Fish oil capsules -->
  <g transform="translate(60,60)">
    <ellipse cx="40" cy="60" rx="22" ry="45" fill="#f59e0b" opacity="0.85"/>
    <ellipse cx="40" cy="35" rx="22" ry="20" fill="#fbbf24" opacity="0.9"/>
    <text x="40" y="70" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">EPA</text>
  </g>
  <g transform="translate(130,70)">
    <ellipse cx="35" cy="50" rx="20" ry="40" fill="#f59e0b" opacity="0.75"/>
    <ellipse cx="35" cy="28" rx="20" ry="18" fill="#fbbf24" opacity="0.85"/>
    <text x="35" y="58" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">DHA</text>
  </g>
  <!-- Blood pressure monitor -->
  <g transform="translate(250,40)">
    <rect x="0" y="0" width="120" height="160" rx="12" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <rect x="15" y="15" width="90" height="60" rx="6" fill="#1e3a5f"/>
    <text x="60" y="45" text-anchor="middle" fill="#4ade80" font-size="28" font-weight="bold" font-family="monospace">120</text>
    <text x="60" y="67" text-anchor="middle" fill="#86efac" font-size="18" font-family="monospace">80</text>
    <circle cx="60" cy="110" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="60" y="116" text-anchor="middle" fill="#16a34a" font-size="16">♥</text>
    <rect x="40" y="140" width="40" height="8" rx="4" fill="#16a34a"/>
  </g>
  <!-- Arrow down (pressure reducing) -->
  <g transform="translate(420,80)">
    <path d="M30,0 L30,80 L10,80 L40,120 L70,80 L50,80 L50,0 Z" fill="#16a34a" opacity="0.6"/>
    <text x="40" y="60" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">-4.5</text>
    <text x="40" y="78" text-anchor="middle" fill="white" font-size="10" font-family="Arial">mmHg</text>
  </g>
  <!-- Title text -->
  <text x="540" y="100" font-family="Georgia, serif" font-size="22" fill="#1e3a5f" font-weight="bold">Omega-3 y</text>
  <text x="540" y="130" font-family="Georgia, serif" font-size="22" fill="#1e3a5f" font-weight="bold">Presión Arterial</text>
  <text x="540" y="165" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Evidencia de 71 ensayos clínicos</text>
  <text x="540" y="185" font-family="Arial, sans-serif" font-size="14" fill="#64748b">con 4,973 participantes</text>
  <!-- Wave pattern (ocean/fish) -->
  <path d="M0,270 Q100,250 200,270 Q300,290 400,270 Q500,250 600,270 Q700,290 800,270 L800,300 L0,300 Z" fill="#3b82f6" opacity="0.15"/>
  <path d="M0,280 Q100,260 200,280 Q300,300 400,280 Q500,260 600,280 Q700,300 800,280 L800,300 L0,300 Z" fill="#3b82f6" opacity="0.1"/>
</svg>
