<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg1)" rx="12"/>
  <!-- Capsule icon -->
  <g transform="translate(80,80)">
    <rect x="0" y="20" width="60" height="100" rx="30" fill="#16a34a" opacity="0.8"/>
    <rect x="0" y="20" width="60" height="50" rx="30" fill="#15803d"/>
    <text x="30" y="80" text-anchor="middle" fill="white" font-size="20" font-family="Arial">Ω3</text>
  </g>
  <!-- Leaf icon -->
  <g transform="translate(200,70)">
    <ellipse cx="40" cy="60" rx="35" ry="55" fill="#22c55e" opacity="0.7" transform="rotate(-20,40,60)"/>
    <line x1="40" y1="10" x2="40" y2="115" stroke="#15803d" stroke-width="2"/>
    <line x1="40" y1="40" x2="60" y2="25" stroke="#15803d" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="20" y2="45" stroke="#15803d" stroke-width="1.5"/>
    <line x1="40" y1="80" x2="60" y2="65" stroke="#15803d" stroke-width="1.5"/>
  </g>
  <!-- Molecule icon -->
  <g transform="translate(320,80)">
    <circle cx="30" cy="30" r="15" fill="#3b82f6" opacity="0.7"/>
    <circle cx="80" cy="50" r="12" fill="#60a5fa" opacity="0.7"/>
    <circle cx="50" cy="90" r="18" fill="#2563eb" opacity="0.6"/>
    <line x1="30" y1="30" x2="80" y2="50" stroke="#93c5fd" stroke-width="3"/>
    <line x1="80" y1="50" x2="50" y2="90" stroke="#93c5fd" stroke-width="3"/>
    <line x1="30" y1="30" x2="50" y2="90" stroke="#93c5fd" stroke-width="3"/>
    <text x="50" y="140" text-anchor="middle" fill="#1e3a5f" font-size="12" font-family="Arial">CoQ10</text>
  </g>
  <!-- Text -->
  <text x="500" y="110" font-family="Georgia, serif" font-size="28" fill="#1e3a5f" font-weight="bold">6 Ingredientes</text>
  <text x="500" y="145" font-family="Georgia, serif" font-size="28" fill="#1e3a5f" font-weight="bold">con Respaldo</text>
  <text x="500" y="180" font-family="Georgia, serif" font-size="28" fill="#15803d" font-weight="bold">Científico</text>
  <text x="500" y="220" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Análisis de estudios PubMed</text>
  <text x="500" y="240" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Dosis · Evidencia · Seguridad</text>
</svg>